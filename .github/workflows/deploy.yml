# =============================================================
# Snake Game — CI/CD Pipeline
# Lint → Build → Push to GHCR → Deploy to GitHub Pages → Notify Slack
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/snake-game
  NODE_VERSION: "20"

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  # -----------------------------------------------------------
  # Job 1: Lint HTML
  # -----------------------------------------------------------
  lint:
    name: Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "src/**/*.html" --config .htmlhintrc

  # -----------------------------------------------------------
  # Job 2: Build and Push Docker Image to GHCR
  # -----------------------------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_url: ${{ steps.output.outputs.image_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set output URL
        id: output
        run: echo "image_url=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Print image URL to Job Summary
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | GitHub Container Registry (GHCR) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA Tag** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pull Command" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------
  # Job 3: Deploy to GitHub Pages
  # -----------------------------------------------------------
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp src/index.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Pages URL to Job Summary
        run: |
          echo "## GitHub Pages Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Live URL** | ${{ steps.deployment.outputs.page_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Source** | \`src/index.html\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | Deployed |" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------
  # Job 4: Slack Notification
  # -----------------------------------------------------------
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-pages]
    if: always() && github.event_name == 'push' && needs.deploy-pages.result == 'success'

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "#00e676",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ":rocket: *Snake Game deployed to GitHub Pages!*"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Live URL:*\n${{ needs.deploy-pages.outputs.page_url }}" },
                        { "type": "mrkdwn", "text": "*GHCR Image:*\n`${{ needs.build-and-push.outputs.image_url }}`" },
                        { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                        { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "Play Snake Game" },
                          "url": "${{ needs.deploy-pages.outputs.page_url }}",
                          "style": "primary"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Run" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

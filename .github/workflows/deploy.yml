# =============================================================
# Snake Game — CI/CD Pipeline
# Lint → Build → Push to DockerHub → Notify via Slack
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/snake-game
  NODE_VERSION: "20"

jobs:
  # -----------------------------------------------------------
  # Job 1: Lint HTML
  # -----------------------------------------------------------
  lint:
    name: Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "src/**/*.html" --config .htmlhintrc

  # -----------------------------------------------------------
  # Job 2: Build and Push Docker Image
  # -----------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: docker pull ${{ env.DOCKER_IMAGE }}:latest

  # -----------------------------------------------------------
  # Job 3: Slack Notification
  # -----------------------------------------------------------
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [lint, build-and-push]
    if: always() && github.event_name == 'push'

    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "color=#00e676" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "text=Pipeline succeeded" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "color=#ff5252" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "text=Pipeline failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} *Snake Game — ${{ steps.status.outputs.text }}*"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                        { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" },
                        { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Image:*\n`${{ env.DOCKER_IMAGE }}:latest`" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Run" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

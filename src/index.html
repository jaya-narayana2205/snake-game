<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 480px;
            padding: 0 4px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00e676, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scoreboard {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
        }

        .score-value {
            font-size: 22px;
            font-weight: 700;
            color: #00e676;
            font-variant-numeric: tabular-nums;
        }

        .high-score .score-value {
            color: #ffd740;
        }

        .canvas-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(0, 230, 118, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        canvas {
            display: block;
            background: #12121a;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.88);
            backdrop-filter: blur(6px);
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .overlay-title.game-over {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-title.start {
            background: linear-gradient(135deg, #00e676, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-score {
            font-size: 18px;
            color: #999;
        }

        .final-score span {
            color: #00e676;
            font-weight: 700;
            font-size: 22px;
        }

        .btn {
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #0a0a0f;
            background: linear-gradient(135deg, #00e676, #00c853);
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0, 230, 118, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .hint {
            font-size: 12px;
            color: #555;
            letter-spacing: 0.5px;
        }

        .controls-hint {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #444;
        }

        .controls-hint kbd {
            display: inline-block;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            padding: 2px 7px;
            font-family: inherit;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <div class="title">Snake</div>
            <div class="scoreboard">
                <div class="score-item">
                    <span class="score-label">Score</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item high-score">
                    <span class="score-label">Best</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>

            <div class="overlay" id="startScreen">
                <div class="overlay-title start">Snake</div>
                <button class="btn" id="startBtn">Start Game</button>
                <div class="hint">or press Space / Enter</div>
            </div>

            <div class="overlay hidden" id="gameOverScreen">
                <div class="overlay-title game-over">Game Over</div>
                <div class="final-score">Score: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">Play Again</button>
                <div class="hint">or press Space / Enter</div>
            </div>
        </div>

        <div class="controls-hint">
            <span><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or Arrow Keys to move</span>
            <span><kbd>P</kbd> to pause</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // DOM elements
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Game config
        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const BASE_SPEED = 130;
        const MIN_SPEED = 60;

        // Game state
        let snake, direction, nextDirection, food, score, highScore, gameLoop, gameState;
        // gameState: 'start' | 'playing' | 'paused' | 'over'

        highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        highScoreEl.textContent = highScore;

        // Colors
        const COLORS = {
            grid1: '#12121a',
            grid2: '#14141e',
            snakeHead: '#00e676',
            snakeBody: '#00c853',
            snakeTail: '#00a844',
            snakeStroke: '#0a0a0f',
            food: '#ff5252',
            foodGlow: 'rgba(255, 82, 82, 0.25)',
            foodInner: '#ff8a80',
        };

        function init() {
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY },
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = '0';
            spawnFood();
        }

        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE),
                };
            } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
            food = pos;
        }

        function getSpeed() {
            return Math.max(MIN_SPEED, BASE_SPEED - score * 2);
        }

        // Drawing
        function drawGrid() {
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? COLORS.grid1 : COLORS.grid2;
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
        }

        function drawSnake() {
            const len = snake.length;
            snake.forEach((seg, i) => {
                const px = seg.x * CELL_SIZE;
                const py = seg.y * CELL_SIZE;
                const ratio = i / Math.max(len - 1, 1);

                // Gradient from head to tail
                const r = Math.round(0 + ratio * 10);
                const g = Math.round(230 - ratio * 80);
                const b = Math.round(118 - ratio * 60);
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

                const pad = i === 0 ? 1 : 1.5;
                const radius = i === 0 ? 6 : 4;

                ctx.beginPath();
                ctx.roundRect(px + pad, py + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, radius);
                ctx.fill();

                ctx.strokeStyle = COLORS.snakeStroke;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                // Eyes on head
                if (i === 0) {
                    drawEyes(px, py);
                }
            });
        }

        function drawEyes(px, py) {
            const cx = px + CELL_SIZE / 2;
            const cy = py + CELL_SIZE / 2;
            const eyeOffset = 4;
            const eyeSize = 2.5;

            let eye1, eye2;
            if (direction.x === 1) {
                eye1 = { x: cx + 4, y: cy - eyeOffset };
                eye2 = { x: cx + 4, y: cy + eyeOffset };
            } else if (direction.x === -1) {
                eye1 = { x: cx - 4, y: cy - eyeOffset };
                eye2 = { x: cx - 4, y: cy + eyeOffset };
            } else if (direction.y === -1) {
                eye1 = { x: cx - eyeOffset, y: cy - 4 };
                eye2 = { x: cx + eyeOffset, y: cy - 4 };
            } else {
                eye1 = { x: cx - eyeOffset, y: cy + 4 };
                eye2 = { x: cx + eyeOffset, y: cy + 4 };
            }

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(eye1.x, eye1.y, eyeSize, 0, Math.PI * 2);
            ctx.arc(eye2.x, eye2.y, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(eye1.x, eye1.y, 1.2, 0, Math.PI * 2);
            ctx.arc(eye2.x, eye2.y, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFood(timestamp) {
            const px = food.x * CELL_SIZE;
            const py = food.y * CELL_SIZE;
            const cx = px + CELL_SIZE / 2;
            const cy = py + CELL_SIZE / 2;

            // Pulsing glow
            const pulse = 1 + Math.sin(timestamp / 300) * 0.15;
            const glowRadius = CELL_SIZE * 0.9 * pulse;

            ctx.save();
            const glow = ctx.createRadialGradient(cx, cy, 2, cx, cy, glowRadius);
            glow.addColorStop(0, COLORS.foodGlow);
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(px - CELL_SIZE / 2, py - CELL_SIZE / 2, CELL_SIZE * 2, CELL_SIZE * 2);
            ctx.restore();

            // Apple body
            const appleRadius = (CELL_SIZE / 2 - 3) * (0.95 + Math.sin(timestamp / 300) * 0.05);
            ctx.beginPath();
            ctx.arc(cx, cy + 1, appleRadius, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.food;
            ctx.fill();

            // Highlight
            ctx.beginPath();
            ctx.arc(cx - 2, cy - 2, appleRadius * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.foodInner;
            ctx.fill();

            // Stem
            ctx.beginPath();
            ctx.moveTo(cx, cy - appleRadius + 1);
            ctx.quadraticCurveTo(cx + 3, cy - appleRadius - 4, cx + 1, cy - appleRadius - 5);
            ctx.strokeStyle = '#66bb6a';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function draw(timestamp) {
            drawGrid();
            drawFood(timestamp || 0);
            drawSnake();
        }

        // Game logic
        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y,
            };

            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                spawnFood();

                // Restart loop with new speed
                clearInterval(gameLoop);
                gameLoop = setInterval(tick, getSpeed());
            } else {
                snake.pop();
            }
        }

        let lastTimestamp = 0;
        function animationFrame(timestamp) {
            if (gameState === 'playing' || gameState === 'paused') {
                draw(timestamp);
            }
            if (gameState !== 'over') {
                requestAnimationFrame(animationFrame);
            }
        }

        function tick() {
            if (gameState === 'playing') {
                update();
            }
        }

        function startGame() {
            init();
            gameState = 'playing';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameLoop = setInterval(tick, getSpeed());
            requestAnimationFrame(animationFrame);
        }

        function endGame() {
            gameState = 'over';
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }

            finalScoreEl.textContent = score;

            // Brief delay before showing overlay
            setTimeout(() => {
                gameOverScreen.classList.remove('hidden');
            }, 300);
        }

        // Input handling
        const KEY_MAP = {
            ArrowUp: { x: 0, y: -1 },    KeyW: { x: 0, y: -1 },
            ArrowDown: { x: 0, y: 1 },    KeyS: { x: 0, y: 1 },
            ArrowLeft: { x: -1, y: 0 },   KeyA: { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 },   KeyD: { x: 1, y: 0 },
        };

        document.addEventListener('keydown', (e) => {
            // Start / restart
            if ((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') {
                e.preventDefault();
                startGame();
                return;
            }

            // Pause
            if (e.code === 'KeyP' && (gameState === 'playing' || gameState === 'paused')) {
                gameState = gameState === 'paused' ? 'playing' : 'paused';
                return;
            }

            // Direction
            const newDir = KEY_MAP[e.code];
            if (newDir && gameState === 'playing') {
                e.preventDefault();
                // Prevent 180-degree turn
                if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
                    nextDirection = newDir;
                }
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initial render
        gameState = 'start';
        init();
        draw(0);
    </script>
</body>
</html>

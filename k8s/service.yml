# =============================================================
# Service — NodePort exposing the app on port 30080
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: snake-game
  namespace: snake-game
  labels:
    app: snake-game
    component: webserver
spec:
  type: NodePort
  selector:
    app: snake-game
  ports:
    - name: http
      protocol: TCP
      port: 80               # Service port (cluster-internal)
      targetPort: http        # Maps to container port 8080
      nodePort: 30080         # External access on node IP:30080

# =============================================================
# HorizontalPodAutoscaler — scales 2-5 pods based on CPU
# =============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: snake-game
  namespace: snake-game
  labels:
    app: snake-game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: snake-game
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
